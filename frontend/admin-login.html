<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Sign In - MLSA Saranathan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar navbar-expand-md navbar-mlsa sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/college-logo.png" alt="Saranathan College of Engineering logo" class="brand-badge">
        <span class="brand-divider"></span>
        <img src="assets/mlsa-badge.png" alt="Microsoft Learn Student Ambassador badge" class="brand-badge">
        <span class="brand-text">
          <span class="title d-block">MLSA &middot; Saranathan</span>
          <span class="subtitle d-none d-sm-block">Dept. of AI &amp; Data Science</span>
        </span>
      </a>
    </div>
  </nav>

  <section class="container py-5 d-flex justify-content-center">
    <div class="card-fluent p-4 w-100" style="max-width: 26rem;">
      <h1 class="h5 fw-bold mb-1">Admin sign in</h1>
      <p class="text-subtle small mb-4">Manage updates, events, and registrations.</p>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label small fw-medium">Email</label>
          <input required type="email" name="email" class="form-control" id="loginEmail">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium">Password</label>
          <input required type="password" name="password" class="form-control" id="loginPassword">
        </div>
        <div id="loginError" class="text-fluent-error small mb-3 d-none"></div>
        <button type="submit" id="loginBtn" class="btn btn-fluent-primary w-100">Sign in</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, skip straight to the dashboard.
    if (auth.isLoggedIn()) {
      window.location.href = "admin-dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      errorEl.classList.add("d-none");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const data = await api.login(email, password);
        auth.login(data.access_token, data.admin_name);
        window.location.href = "admin-dashboard.html";
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("d-none");
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
