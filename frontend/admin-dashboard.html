<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - MLSA Saranathan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar navbar-expand-md navbar-mlsa sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/college-logo.png" alt="Saranathan College of Engineering logo" class="brand-badge">
        <span class="brand-divider"></span>
        <img src="assets/mlsa-badge.png" alt="Microsoft Learn Student Ambassador badge" class="brand-badge">
        <span class="brand-text">
          <span class="title d-block">MLSA &middot; Saranathan</span>
          <span class="subtitle d-none d-sm-block">Dept. of AI &amp; Data Science</span>
        </span>
      </a>
    </div>
  </nav>

  <section class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <p class="text-fluent-primary fw-semibold small text-uppercase mb-1">Admin</p>
        <h1 class="h3 fw-bold mb-0">Welcome, <span id="adminName"></span></h1>
      </div>
      <button id="logoutBtn" class="btn btn-fluent-secondary btn-sm">Sign out</button>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="dashboardTabs">
      <li class="nav-item">
        <button class="nav-link active" data-tab="updates" type="button">Updates</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="events" type="button">Events</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="registrations" type="button">Registrations</button>
      </li>
    </ul>

    <!-- ============ UPDATES TAB ============ -->
    <div id="tab-updates" class="tab-pane">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card-fluent p-4">
            <h2 class="h6 fw-semibold mb-3">Post a new update</h2>
            <form id="updateForm">
              <div class="mb-3">
                <label class="form-label small fw-medium">Title</label>
                <input required name="title" type="text" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Body</label>
                <textarea required name="body" rows="5" class="form-control"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Category</label>
                <select name="category" class="form-select">
                  <option>General</option>
                  <option>Workshop</option>
                  <option>Achievement</option>
                  <option>Announcement</option>
                </select>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="pinned" id="pinnedCheck">
                <label class="form-check-label small" for="pinnedCheck">Pin to top</label>
              </div>
              <div id="updateError" class="text-fluent-error small mb-2 d-none"></div>
              <button type="submit" id="updateSubmitBtn" class="btn btn-fluent-primary w-100">Publish update</button>
            </form>
          </div>
        </div>
        <div class="col-lg-7">
          <div id="updatesList" class="d-flex flex-column gap-3"></div>
        </div>
      </div>
    </div>

    <!-- ============ EVENTS TAB ============ -->
    <div id="tab-events" class="tab-pane d-none">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card-fluent p-4">
            <h2 id="eventFormTitle" class="h6 fw-semibold mb-3">Create an event</h2>
            <form id="eventForm">
              <input type="hidden" name="editing_id" value="">
              <div class="mb-3">
                <label class="form-label small fw-medium">Title</label>
                <input required name="title" type="text" class="form-control">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Short tagline (optional)</label>
                <input name="banner_note" type="text" class="form-control" placeholder="e.g. Hands-on Azure workshop">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-medium">Description</label>
                <textarea required name="description" rows="4" class="form-control"></textarea>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label small fw-medium">Date &amp; time</label>
                  <input required name="event_date" type="datetime-local" class="form-control">
                </div>
                <div class="col-6">
                  <label class="form-label small fw-medium">Registration deadline</label>
                  <input name="registration_deadline" type="datetime-local" class="form-control">
                </div>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label small fw-medium">Location</label>
                  <input name="location" type="text" class="form-control" value="Online">
                </div>
                <div class="col-6">
                  <label class="form-label small fw-medium">Capacity (optional)</label>
                  <input name="capacity" type="number" min="1" class="form-control">
                </div>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_open" id="isOpenCheck" checked>
                <label class="form-check-label small" for="isOpenCheck">Registration open</label>
              </div>
              <div id="eventError" class="text-fluent-error small mb-2 d-none"></div>
              <div class="d-flex gap-2">
                <button type="submit" id="eventSubmitBtn" class="btn btn-fluent-primary flex-fill">Create event</button>
                <button type="button" id="eventCancelBtn" class="btn btn-fluent-secondary d-none">Cancel</button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-7">
          <div id="eventsList" class="d-flex flex-column gap-3"></div>
        </div>
      </div>
    </div>

    <!-- ============ REGISTRATIONS TAB ============ -->
    <div id="tab-registrations" class="tab-pane d-none">
      <div id="regNoEvents" class="text-subtle small d-none">
        Create an event first to start collecting registrations.
      </div>
      <div id="regContent" class="d-none">
        <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
          <select id="regEventSelect" class="form-select" style="max-width: 20rem;"></select>
          <a id="regExportBtn" href="#" class="btn btn-fluent-secondary btn-sm">⬇ Export CSV</a>
          <span id="regCount" class="text-subtle small"></span>
        </div>
        <div id="regTableWrap" class="card-fluent" style="overflow-x: auto;"></div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
